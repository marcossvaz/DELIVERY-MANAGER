services:
  postgres:
    image: bitnami/postgresql:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: delivery_manager
      POSTGRES_PASSWORD: delivery_manager
      POSTGRES_DB: delivery_manager
    volumes:
      - postgres_data:/bitnami/postgresql

  redis:
    image: bitnami/redis:latest
    ports:
      - "6379:6379"
    environment:
      ALLOW_EMPTY_PASSWORD: yes
    volumes:
      - redis_data:/bitnami/redis/data

volumes:
  postgres_data:
  redis_data: